server {
    listen 80;
    server_name beta2.tottalbattle.com;

    access_log /var/log/nginx/beta2.access.log;
    error_log  /var/log/nginx/beta2.error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml;
    gzip_min_length 1000;

    # Favicons → корень сайта
    location ~ ^/(favicon\.ico|favicon-.*\.png|favicon\.svg|apple-touch-icon\.png|site\.webmanifest|manifest\.json)$ {
        alias /static/favicons/$1;
        access_log off;
        log_not_found off;
    }

    # Статика напрямую с диска
    location /static/ {
        alias /static/;
        expires 7d;
        access_log off;
    }

    # Проксирование в Gunicorn через сокет
    location / {
        proxy_pass http://unix:/run/flask-beta2/flask-beta2.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }
}

