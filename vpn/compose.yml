services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: c1vh-3x-ui
    restart: unless-stopped
    network_mode: "host"
    tty: true
    volumes:
      - ./log:/var/log
      - ./db:/etc/x-ui
      - ./cert:/root/cert
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"

networks:
  vpn_net:
    name: c1vh_vpn_net

